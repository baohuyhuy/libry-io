services:
  mysql:
    image: mysql:8.0
    container_name: libry-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: libry
      MYSQL_USER: libry
      MYSQL_PASSWORD: libry
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-proot']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mysql-workbench:
    image: lscr.io/linuxserver/mysql-workbench:latest
    container_name: libry-mysql-workbench
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PUID: 1000
      PGID: 1000
      TZ: UTC
    ports:
      - '3000:3000'
      - '3001:3001'
    volumes:
      - mysql-workbench-data:/config
    shm_size: '1gb'

volumes:
  mysql-data:
  mysql-workbench-data:
