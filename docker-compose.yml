services:
  mysql:
    image: mysql:8.0
    container_name: libry-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: libry
      MYSQL_USER: libry
      MYSQL_PASSWORD: libry
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-proot']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mysql-data:
